<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS-Security WebShop</title>
    <!-- Bootstrap 5 CSS für modernes Design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529; }
    </style>
</head>
<body>

    <!-- Globale Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">🛡️ ITS-Shop</a>
            <div class="navbar-nav ms-auto">
                {% if session.get('username') %}
                    <span class="navbar-text text-white me-3">Willkommen, <b>{{ session['username'] }}</b></span>
                    <a class="nav-link btn btn-outline-light text-white px-3 me-2" href="/logout">Abmelden</a>
                {% else %}
                    <a class="nav-link btn btn-outline-danger text-white px-3" href="/login">Anmelden</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Hauptinhalt der Seite -->
    <div class="container my-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center py-4 text-muted border-top mt-5">
        <p>&copy; 2026 - ITS Universität Lehrprojekt (Vulnerable Web Application)</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
