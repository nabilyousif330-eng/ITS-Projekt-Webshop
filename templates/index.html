{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mb-5">
    <div class="col-md-8 text-center">
        <h1 class="display-4 fw-bold text-dark">ITS-Security Hardware Shop</h1>
        <p class="lead text-muted">Exklusive Tools und Software für Penetration Testing und IT-Sicherheitsexperten.</p>
    </div>
</div>

<!-- Produkt-Grid -->
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card h-100 shadow-sm border-0">
            <img src="{{ product.image_url }}" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title fw-bold text-dark">{{ product.name }}</h5>
                <p class="card-text text-muted flex-grow-1">{{ product.description }}</p>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="fs-5 fw-bold text-danger">{{ "%.2f"|format(product.price) }} €</span>
                    <button class="btn btn-dark btn-sm px-3">In den Warenkorb</button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
