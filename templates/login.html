{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 mt-5">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0 fw-bold">🔑 ITS-Shop Kunden-Login</h4>
            </div>
            <div class="card-body p-4">
                
                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Benutzername</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="z.B. admin" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Passwort</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Passwort eingeben" required>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-danger btn-block fw-bold py-2">Einloggen</button>
                    </div>
                </form>

                <div class="mt-4 text-center text-muted border-top pt-3">
                    <small><b>Hinweis für Studierende:</b> Diese Login-Schnittstelle ist anfällig für SQL-Injection (Form-basiert).</small>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
